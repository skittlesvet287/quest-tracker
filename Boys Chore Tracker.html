<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- iOS Home-Screen install / standalone app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quest Tracker">
<meta name="theme-color" content="#1f3a4d">
<link id="appleIcon" rel="apple-touch-icon" href="">

<title>Quest Tracker</title>

<!-- Google Fonts (with system fallbacks for offline) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================
   QUEST TRACKER — single-file household reward tracker
   Sections: tokens / reset+ios / layout / components / animations
   ============================================================ */

:root{
  --ink:#1f3a4d; --quest:#2f7d5b; --gold:#f3a712; --coral:#ef6f5c;
  --sky:#3f86bf; --paper:#fbf7ef; --line:#d8d2c4;
  --quest-soft:#e4f1ea; --gold-soft:#fdf0d6; --coral-soft:#fce4df; --sky-soft:#e2eef7;
  --radius:16px; --radius-sm:12px;
  --shadow:0 4px 14px rgba(31,58,77,.10);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --display:"Baloo 2", system-ui, -apple-system, "Segoe UI", sans-serif;
  --body:"Nunito", system-ui, -apple-system, "Segoe UI", sans-serif;
}

/* ---- reset + iOS touch feel ---- */
*{ box-sizing:border-box; margin:0; padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  -webkit-user-select:none; user-select:none;
}
html,body{ height:100%; overflow:hidden; }
body{
  font-family:var(--body); color:var(--ink); background:var(--ink);
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
  position:fixed; inset:0; width:100%; height:100%;
  touch-action:manipulation;
}
button{ font-family:inherit; color:inherit; border:none; background:none; cursor:pointer; touch-action:manipulation; }
input{ font-family:inherit; font-size:16px; } /* >=16px so iOS never zooms on focus */
.accent-quest{ --accent:var(--quest); --accent-soft:var(--quest-soft); }
.accent-coral{ --accent:var(--coral); --accent-soft:var(--coral-soft); }

/* ---- app shell ---- */
#app{
  position:fixed; inset:0; background:var(--paper);
  display:flex; flex-direction:column;
  padding-top:var(--safe-top); padding-left:var(--safe-left); padding-right:var(--safe-right);
  max-width:560px; margin:0 auto;
}
.scroll{
  flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:14px 16px calc(24px + var(--safe-bottom));
}
.screen{ display:none; flex-direction:column; min-height:100%; }
.screen.active{ display:flex; }

/* ---- top bar ---- */
.topbar{
  flex:0 0 auto; display:flex; align-items:center; gap:10px;
  padding:10px 14px; background:var(--paper); border-bottom:1px solid var(--line);
}
.topbar h1{ font-family:var(--display); font-weight:800; font-size:20px; flex:1; letter-spacing:.2px; }
.iconbtn{
  width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:20px; background:#fff; box-shadow:var(--shadow); flex:0 0 auto;
}
.iconbtn:active{ transform:scale(.94); }

/* ---- headings ---- */
h2.section{ font-family:var(--display); font-weight:700; font-size:17px; margin:18px 2px 10px; display:flex; align-items:center; gap:8px; }
.muted{ color:#6b7c87; font-weight:600; }
.tiny{ font-size:12px; }

/* ---- kid picker ---- */
.kidcards{ display:flex; flex-direction:column; gap:16px; margin-top:6px; }
.kidcard{
  position:relative; border-radius:var(--radius); padding:22px 20px; background:#fff;
  box-shadow:var(--shadow); border:3px solid var(--accent); display:flex; align-items:center; gap:16px;
  text-align:left;
}
.kidcard:active{ transform:scale(.98); }
.kidcard .avatar{
  width:64px; height:64px; border-radius:18px; background:var(--accent-soft);
  display:flex; align-items:center; justify-content:center; font-size:34px; flex:0 0 auto;
}
.kidcard .who{ flex:1; }
.kidcard .who .name{ font-family:var(--display); font-weight:800; font-size:24px; }
.kidcard .lvl{ display:inline-block; margin-top:4px; font-size:12px; font-weight:800; color:#fff; background:var(--accent); padding:3px 10px; border-radius:999px; }
.kidcard .bal{ font-family:var(--display); font-weight:800; font-size:30px; color:var(--accent); display:flex; align-items:center; gap:4px; }

/* ---- balance hero ---- */
.hero{
  border-radius:var(--radius); padding:20px; background:linear-gradient(135deg,var(--accent-soft),#fff);
  border:2px solid var(--accent); box-shadow:var(--shadow); text-align:center; margin-top:4px;
}
.hero .star{ font-size:40px; }
.hero .balnum{ font-family:var(--display); font-weight:800; font-size:56px; line-height:1; color:var(--accent); }
.hero .cash{ font-weight:800; font-size:18px; color:var(--quest); margin-top:6px; }
.hero .cash.hidden{ display:none; }

/* ---- generic card ---- */
.card{ background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; }

/* ---- daily quests ---- */
.quest-row{
  display:flex; align-items:center; gap:14px; padding:14px; border-radius:var(--radius-sm);
  background:#fff; box-shadow:var(--shadow); margin-bottom:10px; min-height:60px;
}
.quest-row:active{ transform:scale(.99); }
.quest-row .emoji{ font-size:26px; flex:0 0 auto; }
.quest-row .label{ flex:1; font-weight:700; font-size:16px; }
.checkbox{
  width:34px; height:34px; border-radius:10px; border:3px solid var(--line); flex:0 0 auto;
  display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff;
  transition:background .15s, border-color .15s, transform .15s;
}
.quest-row.done{ background:var(--quest-soft); }
.quest-row.done .checkbox{ background:var(--quest); border-color:var(--quest); transform:scale(1.05); }
.quest-row.done .label{ color:var(--quest); }
.progress-pill{ font-size:13px; font-weight:800; color:var(--quest); background:var(--quest-soft); padding:4px 12px; border-radius:999px; }

/* ---- bonus buttons ---- */
.bonus-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.bonus-btn{
  position:relative; background:#fff; border-radius:var(--radius-sm); box-shadow:var(--shadow);
  padding:16px 12px; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
  border:2px solid var(--gold-soft); min-height:108px; justify-content:center;
}
.bonus-btn:active{ transform:scale(.96); }
.bonus-btn .emoji{ font-size:30px; }
.bonus-btn .label{ font-weight:700; font-size:13px; line-height:1.15; }
.bonus-btn .stars{ font-size:12px; font-weight:800; color:var(--gold); background:var(--gold-soft); padding:2px 10px; border-radius:999px; }

/* ---- goal bar ---- */
.goalwrap{ margin-top:4px; }
.goalbar{ height:24px; border-radius:999px; background:var(--line); overflow:hidden; position:relative; }
.goalfill{ height:100%; background:linear-gradient(90deg,var(--gold),var(--coral)); width:0%; transition:width .5s cubic-bezier(.3,1.3,.5,1); border-radius:999px; }
.goal-meta{ display:flex; justify-content:space-between; margin-top:6px; font-weight:700; font-size:13px; }
.goal-label{ font-weight:800; margin-bottom:8px; }

/* ---- big primary buttons ---- */
.bigbtn{
  width:100%; padding:16px; border-radius:var(--radius); font-family:var(--display); font-weight:800;
  font-size:18px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; gap:8px;
  min-height:56px; margin-top:12px;
}
.bigbtn:active{ transform:scale(.98); }
.btn-gold{ background:var(--gold); color:var(--ink); }
.btn-quest{ background:var(--quest); color:#fff; }
.btn-sky{ background:var(--sky); color:#fff; }
.btn-ghost{ background:#fff; color:var(--ink); border:2px solid var(--line); }
.btn-coral{ background:var(--coral); color:#fff; }
.btn-row{ display:flex; gap:10px; }
.btn-row .bigbtn{ flex:1; }

/* ---- shop ---- */
.shop-item{
  display:flex; align-items:center; gap:14px; background:#fff; border-radius:var(--radius-sm);
  box-shadow:var(--shadow); padding:14px; margin-bottom:10px;
}
.shop-item .label{ flex:1; font-weight:700; font-size:16px; }
.shop-item .cost{ font-weight:800; color:var(--gold); white-space:nowrap; }
.redeem-btn{ padding:10px 16px; border-radius:12px; background:var(--quest); color:#fff; font-weight:800; min-height:44px; }
.redeem-btn:disabled{ background:var(--line); color:#fff; opacity:.7; }
.redeem-btn:active:not(:disabled){ transform:scale(.96); }

/* ---- back button ---- */
.backbtn{ display:inline-flex; align-items:center; gap:6px; font-weight:800; color:var(--ink); padding:8px 4px; min-height:44px; }

/* ============ modals & sheets ============ */
.overlay{
  position:fixed; inset:0; background:rgba(31,58,77,.55); display:none; align-items:flex-end;
  justify-content:center; z-index:50; padding:0; backdrop-filter:blur(2px);
}
.overlay.active{ display:flex; }
.sheet{
  width:100%; max-width:560px; background:var(--paper); border-radius:22px 22px 0 0;
  padding:20px 18px calc(22px + var(--safe-bottom)); box-shadow:0 -8px 30px rgba(0,0,0,.25);
  max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch; animation:sheetup .25s ease;
}
@keyframes sheetup{ from{ transform:translateY(100%);} to{ transform:translateY(0);} }
.sheet h3{ font-family:var(--display); font-weight:800; font-size:20px; margin-bottom:6px; }
.sheet .sub{ color:#6b7c87; font-weight:600; margin-bottom:16px; }

/* ---- PIN keypad ---- */
.pin-dots{ display:flex; justify-content:center; gap:14px; margin:10px 0 18px; }
.pin-dot{ width:16px; height:16px; border-radius:50%; background:var(--line); transition:background .15s, transform .15s; }
.pin-dot.filled{ background:var(--ink); transform:scale(1.15); }
.pin-dot.err{ background:var(--coral); }
.keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.key{
  height:64px; border-radius:16px; background:#fff; box-shadow:var(--shadow); font-family:var(--display);
  font-weight:800; font-size:26px; display:flex; align-items:center; justify-content:center;
}
.key:active{ transform:scale(.94); background:var(--sky-soft); }
.key.fn{ font-size:16px; font-weight:700; color:#6b7c87; box-shadow:none; background:transparent; }

/* ---- form fields (parent) ---- */
.field{ margin-bottom:14px; }
.field label{ display:block; font-weight:800; font-size:13px; margin-bottom:6px; }
.field input, .field select, .field textarea{
  width:100%; padding:12px; border-radius:12px; border:2px solid var(--line); background:#fff; font-weight:600;
  -webkit-user-select:text; user-select:text;
}
.field textarea{ min-height:90px; resize:vertical; }
.editrow{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.editrow input{ -webkit-user-select:text; user-select:text; }
.editrow .emoji-in{ width:56px; text-align:center; flex:0 0 auto; }
.editrow .num-in{ width:64px; flex:0 0 auto; }
.editrow .sel-in{ width:90px; flex:0 0 auto; }
.editrow .grow{ flex:1; min-width:0; }
.editrow input,.editrow select{ padding:10px; border-radius:10px; border:2px solid var(--line); background:#fff; font-weight:600; }
.del-x{ width:40px; height:40px; border-radius:10px; background:var(--coral-soft); color:var(--coral); font-weight:800; font-size:18px; flex:0 0 auto; }
.addbtn{ width:100%; padding:12px; border-radius:12px; border:2px dashed var(--line); color:#6b7c87; font-weight:800; margin-top:4px; }
.parent-group{ background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin-bottom:14px; }
.parent-group > h4{ font-family:var(--display); font-size:16px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

/* ---- toast / undo ---- */
#toast{
  position:fixed; left:50%; transform:translateX(-50%) translateY(140%);
  bottom:calc(18px + var(--safe-bottom)); z-index:80;
  background:var(--ink); color:#fff; border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.3); transition:transform .3s cubic-bezier(.3,1.3,.5,1); max-width:92vw;
}
#toast.show{ transform:translateX(-50%) translateY(0); }
#toast .msg{ font-weight:700; font-size:14px; }
#toast .undo{ font-weight:800; color:var(--gold); padding:6px 10px; border-radius:10px; background:rgba(255,255,255,.12); }

/* ---- star pop & confetti ---- */
.starpop{
  position:fixed; z-index:90; font-size:34px; pointer-events:none;
  animation:pop 1s ease-out forwards;
}
@keyframes pop{
  0%{ transform:translate(-50%,-50%) scale(.4); opacity:0; }
  25%{ transform:translate(-50%,-90%) scale(1.3); opacity:1; }
  100%{ transform:translate(-50%,-220%) scale(1); opacity:0; }
}
#confetti{ position:fixed; inset:0; z-index:85; pointer-events:none; }
.celebrate{
  position:fixed; inset:0; z-index:86; display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.celebrate .burst{
  font-family:var(--display); font-weight:800; font-size:34px; color:#fff; background:var(--coral);
  padding:18px 26px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.3); text-align:center;
  animation:burst 1.6s ease forwards;
}
@keyframes burst{
  0%{ transform:scale(.3); opacity:0; }
  20%{ transform:scale(1.1); opacity:1; }
  80%{ transform:scale(1); opacity:1; }
  100%{ transform:scale(1); opacity:0; }
}

.hint{
  margin:14px 2px 0; background:var(--sky-soft); border:2px solid var(--sky); border-radius:14px;
  padding:12px 14px; font-weight:700; font-size:13px; color:var(--ink); display:flex; gap:10px; align-items:center;
}
.hint button{ margin-left:auto; font-weight:800; color:var(--sky); padding:4px 8px; }

.balnum.tick{ animation:tick .4s ease; }
@keyframes tick{ 0%{ transform:scale(1);} 40%{ transform:scale(1.18);} 100%{ transform:scale(1);} }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; transition-duration:.01ms !important; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <button class="iconbtn" id="homeBtn" aria-label="Home" style="display:none">🏠</button>
    <h1 id="topTitle">Quest Tracker</h1>
    <button class="iconbtn" id="parentBtn" aria-label="Parent">🔒</button>
  </div>

  <div class="scroll">
    <!-- ===== Home / kid picker ===== -->
    <section class="screen active" id="screen-home">
      <h2 class="section">✨ Who's questing?</h2>
      <div class="kidcards" id="kidCards"></div>
      <div id="installHint"></div>
    </section>

    <!-- ===== Kid board ===== -->
    <section class="screen" id="screen-kid">
      <button class="backbtn" data-nav="home">◀ Home</button>
      <div class="hero" id="kidHero"></div>

      <h2 class="section">🗓️ Today's Team Quests <span class="progress-pill" id="dailyProgress"></span></h2>
      <div id="dailyList"></div>

      <h2 class="section">⭐ Bonus XP</h2>
      <div class="bonus-grid" id="bonusGrid"></div>

      <h2 class="section">🎯 Goal</h2>
      <div class="card goalwrap" id="goalCard"></div>

      <button class="bigbtn btn-gold" data-nav="shop">🛍️ Reward Shop</button>
      <button class="bigbtn btn-quest" id="cashoutBtn" data-nav="cashout">💰 Cash Out</button>
    </section>

    <!-- ===== Shop ===== -->
    <section class="screen" id="screen-shop">
      <button class="backbtn" data-nav="kid">◀ Back</button>
      <h2 class="section">🛍️ Reward Shop</h2>
      <div class="hero" id="shopBal" style="margin-bottom:8px"></div>
      <div id="shopList"></div>
    </section>

    <!-- ===== Cash out ===== -->
    <section class="screen" id="screen-cashout">
      <button class="backbtn" data-nav="kid">◀ Back</button>
      <h2 class="section">💰 Cash Out</h2>
      <div id="cashoutBody"></div>
    </section>

    <!-- ===== Parent ===== -->
    <section class="screen" id="screen-parent">
      <button class="backbtn" data-nav="home">◀ Done</button>
      <h2 class="section">🛠️ Parent Settings</h2>
      <div id="parentBody"></div>
    </section>
  </div>
</div>

<!-- Toast / undo -->
<div id="toast"><span class="msg"></span><button class="undo">Undo</button></div>

<!-- PIN sheet -->
<div class="overlay" id="pinOverlay">
  <div class="sheet" style="max-width:360px">
    <h3 id="pinTitle">Parent PIN</h3>
    <div class="sub" id="pinSub">Enter the 4-digit PIN</div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="keypad" id="keypad"></div>
    <button class="bigbtn btn-ghost" id="pinCancel">Cancel</button>
  </div>
</div>

<!-- Generic sheet (confirms / prizes) -->
<div class="overlay" id="msgOverlay">
  <div class="sheet" style="max-width:400px">
    <h3 id="msgTitle"></h3>
    <div class="sub" id="msgBody"></div>
    <div class="btn-row" id="msgActions"></div>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
/* ============================================================
   1. STATE / PERSISTENCE
   ============================================================ */
const KEY="questTracker.v1", BAK="questTracker.v1.bak";
const uid=()=>Math.random().toString(36).slice(2,9);
const todayKey=()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };

function seed(){
  return {
    version:1,
    settings:{ starValueCents:25, payDay:"Sunday", parentPin:"0000", soundOn:true },
    kids:[
      { id:"nathan", name:"Nathan", level:8, accent:"quest", mode:"saver",
        stars:0, lifetimeStars:0, goal:{ label:"Saving up!", targetStars:20 },
        dailyQuests:[
          {id:uid(),label:"Make my bed",emoji:"🛏️"},
          {id:uid(),label:"Clear my plate",emoji:"🍽️"},
          {id:uid(),label:"Pack my stuff for tomorrow",emoji:"🎒"},
          {id:uid(),label:"Brush teeth (AM & PM)",emoji:"🦷"}
        ], doneByDate:{} },
      { id:"paxton", name:"Paxton", level:5, accent:"coral", mode:"instant",
        stars:0, lifetimeStars:0, goal:{ label:"5 stars = a prize!", targetStars:5 },
        dailyQuests:[
          {id:uid(),label:"Toys in the bin",emoji:"🧸"},
          {id:uid(),label:"Plate in the sink",emoji:"🍽️"},
          {id:uid(),label:"Get dressed",emoji:"👕"},
          {id:uid(),label:"Brush my teeth",emoji:"🦷"}
        ], doneByDate:{} }
    ],
    bonusQuests:[
      {id:uid(),label:"Listened the first time",emoji:"👂",stars:1},
      {id:uid(),label:"Helped without being asked",emoji:"🤝",stars:1},
      {id:uid(),label:"Kind to my brother",emoji:"💛",stars:1},
      {id:uid(),label:"Took an Extra Quest",emoji:"🌟",stars:2}
    ],
    rewards:[
      {id:uid(),label:"Pick tonight's show",cost:3,scope:"all"},
      {id:uid(),label:"Choose a treat",cost:3,scope:"all"},
      {id:uid(),label:"15 min extra play",cost:4,scope:"all"},
      {id:uid(),label:"Movie night, you pick",cost:10,scope:"all"},
      {id:uid(),label:"Have a friend over",cost:15,scope:"all"}
    ],
    log:[]
  };
}

let state=load();
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
    const bak=localStorage.getItem(BAK);
    if(bak) return JSON.parse(bak);
  }catch(e){ console.warn("load failed",e); }
  return seed();
}
function save(){
  try{
    const json=JSON.stringify(state);
    localStorage.setItem(KEY,json);
    localStorage.setItem(BAK,json);   // auto second copy on every write
  }catch(e){ console.warn("save failed",e); }
}
const kidById=id=>state.kids.find(k=>k.id===id);

/* ============================================================
   2. NAV / RENDER
   ============================================================ */
let currentKidId=null;
const $=s=>document.querySelector(s);
const screens={ home:"screen-home", kid:"screen-kid", shop:"screen-shop", cashout:"screen-cashout", parent:"screen-parent" };

function go(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $("#"+screens[name]).classList.add("active");
  $(".scroll").scrollTop=0;
  $("#homeBtn").style.display = name==="home" ? "none" : "flex";
  $("#parentBtn").style.display = name==="parent" ? "none" : "flex";
  if(name==="kid") renderKid();
  if(name==="shop") renderShop();
  if(name==="cashout") renderCashout();
  if(name==="parent") renderParent();
}

document.body.addEventListener("click",e=>{
  const nav=e.target.closest("[data-nav]");
  if(nav){ go(nav.getAttribute("data-nav")); }
});
$("#homeBtn").addEventListener("click",()=>go("home"));
$("#parentBtn").addEventListener("click",()=>requirePin(()=>go("parent")));

function cash(stars){
  const c=stars*state.settings.starValueCents;
  return "$"+(c/100).toFixed(2);
}

/* ---- Home ---- */
function renderHome(){
  const wrap=$("#kidCards"); wrap.innerHTML="";
  state.kids.forEach(k=>{
    const el=document.createElement("button");
    el.className="kidcard accent-"+k.accent;
    el.innerHTML=`
      <div class="avatar">${k.accent==="quest"?"🦖":"🦊"}</div>
      <div class="who">
        <div class="name">${esc(k.name)}</div>
        <div class="lvl">Level ${k.level}</div>
      </div>
      <div class="bal">⭐ ${k.stars}</div>`;
    el.addEventListener("click",()=>{ currentKidId=k.id; go("kid"); });
    wrap.appendChild(el);
  });
}

/* ---- Kid board ---- */
function renderKid(){
  const k=kidById(currentKidId); if(!k) return go("home");
  const board=$("#screen-kid");
  board.className="screen active accent-"+k.accent;
  $("#topTitle").textContent=k.name+"'s Quests";

  // hero
  $("#kidHero").innerHTML=`
    <div class="star">⭐</div>
    <div class="balnum" id="balNum">${k.stars}</div>
    <div class="cash ${k.mode==="saver"?"":"hidden"}">${cash(k.stars)} saved</div>`;

  // daily quests
  const done=k.doneByDate[todayKey()]||[];
  const dl=$("#dailyList"); dl.innerHTML="";
  k.dailyQuests.forEach(q=>{
    const isDone=done.includes(q.id);
    const row=document.createElement("div");
    row.className="quest-row"+(isDone?" done":"");
    row.innerHTML=`<div class="emoji">${q.emoji||"✅"}</div><div class="label">${esc(q.label)}</div><div class="checkbox">${isDone?"✓":""}</div>`;
    row.addEventListener("click",()=>toggleDaily(k.id,q.id));
    dl.appendChild(row);
  });
  $("#dailyProgress").textContent=`${done.length} of ${k.dailyQuests.length} done`;

  // bonus
  const bg=$("#bonusGrid"); bg.innerHTML="";
  state.bonusQuests.forEach(b=>{
    const btn=document.createElement("button");
    btn.className="bonus-btn";
    btn.innerHTML=`<div class="emoji">${b.emoji||"⭐"}</div><div class="label">${esc(b.label)}</div><div class="stars">+${b.stars} ⭐</div>`;
    btn.addEventListener("click",ev=>earnBonus(k.id,b,ev));
    bg.appendChild(btn);
  });

  renderGoal(k);

  // cash out only for savers
  $("#cashoutBtn").style.display = k.mode==="saver" ? "flex" : "none";
}

function renderGoal(k){
  const t=k.goal.targetStars||0;
  const pct=t>0?Math.min(100,Math.round(k.stars/t*100)):0;
  $("#goalCard").innerHTML=`
    <div class="goal-label">${esc(k.goal.label||"My goal")}</div>
    <div class="goalbar"><div class="goalfill" style="width:${pct}%"></div></div>
    <div class="goal-meta"><span>${k.stars} / ${t} ⭐</span><span>${pct}%</span></div>`;
}

/* ---- Shop ---- */
function renderShop(){
  const k=kidById(currentKidId); if(!k) return go("home");
  $("#screen-shop").className="screen active accent-"+k.accent;
  $("#topTitle").textContent="Reward Shop";
  $("#shopBal").innerHTML=`<div class="balnum">⭐ ${k.stars}</div><div class="cash ${k.mode==="saver"?"":"hidden"}">${cash(k.stars)}</div>`;
  const list=$("#shopList"); list.innerHTML="";
  const items=state.rewards.filter(r=>r.scope==="all"||r.scope===k.id);
  if(!items.length){ list.innerHTML='<p class="muted">No rewards yet — add some in Parent settings.</p>'; return; }
  items.forEach(r=>{
    const can=k.stars>=r.cost;
    const el=document.createElement("div");
    el.className="shop-item";
    el.innerHTML=`<div class="label">${esc(r.label)}</div><div class="cost">${r.cost} ⭐</div>`;
    const btn=document.createElement("button");
    btn.className="redeem-btn"; btn.textContent="Redeem"; btn.disabled=!can;
    btn.addEventListener("click",()=>redeem(k.id,r));
    el.appendChild(btn);
    list.appendChild(el);
  });
}

/* ---- Cash out ---- */
function renderCashout(){
  const k=kidById(currentKidId); if(!k||k.mode!=="saver") return go("kid");
  $("#topTitle").textContent="Cash Out";
  const body=$("#cashoutBody");
  body.innerHTML=`
    <div class="hero accent-quest" style="--accent:var(--quest);--accent-soft:var(--quest-soft)">
      <div class="star">💰</div>
      <div class="balnum" style="color:var(--quest)">${cash(k.stars)}</div>
      <div class="muted" style="margin-top:6px">${k.stars} ⭐ × ${(state.settings.starValueCents/100).toFixed(2)} each</div>
    </div>
    <p class="muted" style="margin:14px 2px">Cashing out turns stars into money owed on <b>${esc(state.settings.payDay)}</b>. Choose how many stars to cash out.</p>
    <div class="field"><label>Stars to cash out</label><input id="cashCount" type="number" min="1" max="${k.stars}" value="${k.stars}" inputmode="numeric"></div>
    <button class="bigbtn btn-quest" id="doCashout" ${k.stars<1?"disabled style=opacity:.5":""}>💵 Cash Out</button>`;
  if(k.stars>=1){
    $("#doCashout").addEventListener("click",()=>{
      let n=parseInt($("#cashCount").value,10);
      if(isNaN(n)||n<1) return;
      n=Math.min(n,k.stars);
      requirePin(()=>cashout(k.id,n));
    });
  }
}

/* ============================================================
   3. ACTIONS (earn / toggle / redeem / cashout / undo)
   ============================================================ */
let lastAction=null; // for undo

function toggleDaily(kidId,questId){
  const k=kidById(kidId); const day=todayKey();
  if(!k.doneByDate[day]) k.doneByDate[day]=[];
  const arr=k.doneByDate[day];
  const i=arr.indexOf(questId);
  if(i>=0) arr.splice(i,1); else arr.push(questId);
  if(!arr.length) delete k.doneByDate[day];
  save(); renderKid();
}

function earnBonus(kidId,b,ev){
  const k=kidById(kidId);
  k.stars+=b.stars; k.lifetimeStars+=b.stars;
  logEvent({type:"earn",kidId,label:b.label,delta:b.stars});
  save();
  // animation
  if(ev) starPop(ev.clientX, ev.clientY, b.stars);
  unlockAudio(); playPing();
  tickBalance();
  renderGoal(k);
  $("#balNum") && ($("#balNum").textContent=k.stars);
  $("#dailyProgress"); // no-op
  setUndo(()=>{ k.stars-=b.stars; k.lifetimeStars-=b.stars; popLog(); save(); renderKid(); }, `+${b.stars} ⭐ for "${b.label}"`);
  // goal celebration
  checkGoal(k);
  renderHomeBadge();
}

function redeem(kidId,r){
  const k=kidById(kidId);
  if(k.stars<r.cost) return;
  requirePin(()=>{
    k.stars-=r.cost;
    logEvent({type:"redeem",kidId,label:r.label,delta:-r.cost});
    save(); renderShop(); renderHomeBadge();
    setUndo(()=>{ k.stars+=r.cost; popLog(); save(); renderShop(); }, `Redeemed "${r.label}"`);
    showMessage("Enjoy! 🎉", `"${r.label}" redeemed for ${r.cost} ⭐.`, [{label:"Yay!",cls:"btn-quest",fn:closeMsg}]);
    confettiBurst();
  });
}

function cashout(kidId,n){
  const k=kidById(kidId);
  n=Math.min(n,k.stars); if(n<1) return;
  const amount=cash(n);
  k.stars-=n;
  logEvent({type:"cashout",kidId,label:`Cashed out ${n} ⭐`,delta:-n});
  save(); renderCashout(); renderHomeBadge();
  setUndo(()=>{ k.stars+=n; popLog(); save(); renderCashout(); }, `Cashed out ${amount}`);
  showMessage("Cashed out! 💵", `${n} ⭐ → <b>${amount}</b> owed on ${esc(state.settings.payDay)}.`, [{label:"Done",cls:"btn-quest",fn:closeMsg}]);
  confettiBurst();
}

function checkGoal(k){
  const t=k.goal.targetStars||0;
  if(t>0 && k.stars>=t){
    confettiBurst();
    if(k.mode==="instant"){
      celebrate("🎉 Goal reached!");
      setTimeout(()=>showMessage("Pick your prize! 🎁", `${esc(k.name)} hit the goal: ${esc(k.goal.label)}`, [{label:"Awesome!",cls:"btn-coral",fn:closeMsg}]),600);
    } else {
      celebrate("🎉 "+esc(k.name)+" hit the goal!");
    }
  }
}

/* ---- log helpers ---- */
function logEvent(ev){ ev.ts=Date.now(); state.log.unshift(ev); if(state.log.length>500) state.log.length=500; }
function popLog(){ state.log.shift(); }

/* ---- undo toast ---- */
let undoTimer=null;
function setUndo(fn,msg){
  lastAction=fn;
  const t=$("#toast");
  t.querySelector(".msg").textContent=msg;
  t.classList.add("show");
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>t.classList.remove("show"),5000);
}
$("#toast").querySelector(".undo").addEventListener("click",()=>{
  if(lastAction){ const f=lastAction; lastAction=null; f(); }
  $("#toast").classList.remove("show");
  clearTimeout(undoTimer);
});

function renderHomeBadge(){ /* keep home card balances fresh for next visit */ renderHome(); }

/* ============================================================
   4. ANIMATIONS (star pop / confetti / celebrate)
   ============================================================ */
function tickBalance(){
  const el=$("#balNum"); if(!el) return;
  el.classList.remove("tick"); void el.offsetWidth; el.classList.add("tick");
}
function starPop(x,y,n){
  if(reducedMotion()) return;
  for(let i=0;i<Math.max(1,n);i++){
    const s=document.createElement("div");
    s.className="starpop"; s.textContent="⭐";
    s.style.left=(x+(Math.random()*40-20))+"px";
    s.style.top=(y+(Math.random()*10))+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}
function celebrate(text){
  const c=document.createElement("div");
  c.className="celebrate";
  c.innerHTML=`<div class="burst">${text}</div>`;
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1800);
}
let confCanvas=$("#confetti"), confCtx=confCanvas.getContext("2d"), confParts=[];
function sizeConf(){ confCanvas.width=innerWidth; confCanvas.height=innerHeight; }
sizeConf(); addEventListener("resize",sizeConf);
function confettiBurst(){
  if(reducedMotion()) return;
  const colors=["#2f7d5b","#f3a712","#ef6f5c","#3f86bf"];
  for(let i=0;i<90;i++){
    confParts.push({ x:innerWidth/2, y:innerHeight*0.35, vx:(Math.random()-0.5)*9, vy:Math.random()*-9-3,
      g:0.28, s:6+Math.random()*7, c:colors[i%colors.length], rot:Math.random()*6, vr:(Math.random()-0.5)*0.4, life:90 });
  }
  if(!confRunning) runConf();
}
let confRunning=false;
function runConf(){
  confRunning=true;
  function frame(){
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
    confParts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--;
      confCtx.save(); confCtx.translate(p.x,p.y); confCtx.rotate(p.rot); confCtx.fillStyle=p.c;
      confCtx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); confCtx.restore(); });
    confParts=confParts.filter(p=>p.life>0 && p.y<confCanvas.height+30);
    if(confParts.length){ requestAnimationFrame(frame); } else { confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); confRunning=false; }
  }
  requestAnimationFrame(frame);
}
function reducedMotion(){ return matchMedia("(prefers-reduced-motion: reduce)").matches; }

/* ---- audio (iOS unlock) ---- */
let audioCtx=null;
function unlockAudio(){
  if(!state.settings.soundOn) return;
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
  }catch(e){}
}
function playPing(){
  if(!state.settings.soundOn||!audioCtx) return;
  try{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(660,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(990,audioCtx.currentTime+0.12);
    g.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18,audioCtx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.25);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.26);
  }catch(e){}
}
document.body.addEventListener("touchstart",unlockAudio,{once:false,passive:true});

/* ============================================================
   5. PIN keypad
   ============================================================ */
let pinBuffer="", pinCallback=null;
function buildKeypad(){
  const kp=$("#keypad"); kp.innerHTML="";
  const keys=["1","2","3","4","5","6","7","8","9","clear","0","del"];
  keys.forEach(k=>{
    const b=document.createElement("button");
    if(k==="clear"){ b.className="key fn"; b.textContent="Clear"; b.onclick=()=>{ pinBuffer=""; drawDots(); }; }
    else if(k==="del"){ b.className="key fn"; b.textContent="⌫"; b.onclick=()=>{ pinBuffer=pinBuffer.slice(0,-1); drawDots(); }; }
    else { b.className="key"; b.textContent=k; b.onclick=()=>pressPin(k); }
    kp.appendChild(b);
  });
}
function drawDots(err){
  const d=$("#pinDots"); d.innerHTML="";
  for(let i=0;i<4;i++){
    const dot=document.createElement("div");
    dot.className="pin-dot"+(i<pinBuffer.length?" filled":"")+(err?" err":"");
    d.appendChild(dot);
  }
}
function pressPin(n){
  if(pinBuffer.length>=4) return;
  pinBuffer+=n; drawDots();
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinBuffer===state.settings.parentPin){
        const cb=pinCallback; closePin(); if(cb) cb();
      } else {
        drawDots(true);
        if(navigator.vibrate){} // not on iOS; visual only
        setTimeout(()=>{ pinBuffer=""; drawDots(); },400);
      }
    },120);
  }
}
function requirePin(cb){
  pinBuffer=""; pinCallback=cb; drawDots();
  $("#pinOverlay").classList.add("active");
}
function closePin(){ $("#pinOverlay").classList.remove("active"); pinBuffer=""; pinCallback=null; }
$("#pinCancel").addEventListener("click",closePin);
$("#pinOverlay").addEventListener("click",e=>{ if(e.target.id==="pinOverlay") closePin(); });

   6. Generic message sheet

function showMessage(title,body,actions){
  $("#msgTitle").textContent=title;
  $("#msgBody").innerHTML=body;
  const a=$("#msgActions"); a.innerHTML="";
  (actions||[{label:"OK",cls:"btn-ghost",fn:closeMsg}]).forEach(act=>{
    const b=document.createElement("button");
    b.className="bigbtn "+(act.cls||"btn-ghost"); b.textContent=act.label;
    b.onclick=act.fn; a.appendChild(b);
  });
  $("#msgOverlay").classList.add("active");
}
function closeMsg(){ $("#msgOverlay").classList.remove("active"); }
$("#msgOverlay").addEventListener("click",e=>{ if(e.target.id==="msgOverlay") closeMsg(); });

/* ============================================================
   7. PARENT ADMIN
   ============================================================ */
function renderParent(){
  $("#topTitle").textContent="Parent Settings";
  const b=$("#parentBody"); b.innerHTML="";

  // --- Kids ---
  state.kids.forEach(k=>{
    const g=document.createElement("div"); g.className="parent-group";
    g.innerHTML=`<h4>${k.accent==="quest"?"🦖":"🦊"} ${esc(k.name)}</h4>`;
    g.appendChild(field("Name",inputEl("text",k.name,v=>{k.name=v;})));
    g.appendChild(field("Level",inputEl("number",k.level,v=>{k.level=parseInt(v||"0",10)||0;})));
    g.appendChild(field("Accent color",selectEl([["quest","Green (quest)"],["coral","Coral"]],k.accent,v=>{k.accent=v;})));
    g.appendChild(field("Mode",selectEl([["saver","Saver (shows money)"],["instant","Instant (hides money)"]],k.mode,v=>{k.mode=v;})));
    g.appendChild(field("Goal label",inputEl("text",k.goal.label,v=>{k.goal.label=v;})));
    g.appendChild(field("Goal target ⭐",inputEl("number",k.goal.targetStars,v=>{k.goal.targetStars=parseInt(v||"0",10)||0;})));
    // daily quests editor
    const dh=document.createElement("div"); dh.innerHTML=`<label style="font-weight:800;font-size:13px;display:block;margin:6px 0">Daily quests</label>`;
    g.appendChild(dh);
    const dwrap=document.createElement("div");
    k.dailyQuests.forEach(q=>dwrap.appendChild(editRow(q,["emoji","label"],()=>{ k.dailyQuests=k.dailyQuests.filter(x=>x!==q); save(); renderParent(); })));
    g.appendChild(dwrap);
    g.appendChild(addBtn("+ Add daily quest",()=>{ k.dailyQuests.push({id:uid(),label:"New quest",emoji:"⭐"}); save(); renderParent(); }));
    b.appendChild(g);
  });

  // --- Bonus quests ---
  const bg=document.createElement("div"); bg.className="parent-group";
  bg.innerHTML="<h4>⭐ Bonus XP quests</h4>";
  state.bonusQuests.forEach(q=>bg.appendChild(editRow(q,["emoji","label","stars"],()=>{ state.bonusQuests=state.bonusQuests.filter(x=>x!==q); save(); renderParent(); })));
  bg.appendChild(addBtn("+ Add bonus quest",()=>{ state.bonusQuests.push({id:uid(),label:"New bonus",emoji:"⭐",stars:1}); save(); renderParent(); }));
  b.appendChild(bg);

  // --- Rewards ---
  const rg=document.createElement("div"); rg.className="parent-group";
  rg.innerHTML="<h4>🛍️ Reward shop</h4>";
  state.rewards.forEach(r=>rg.appendChild(editRow(r,["label","cost","scope"],()=>{ state.rewards=state.rewards.filter(x=>x!==r); save(); renderParent(); })));
  rg.appendChild(addBtn("+ Add reward",()=>{ state.rewards.push({id:uid(),label:"New reward",cost:3,scope:"all"}); save(); renderParent(); }));
  b.appendChild(rg);

  // --- Settings ---
  const sg=document.createElement("div"); sg.className="parent-group";
  sg.innerHTML="<h4>⚙️ Settings</h4>";
  sg.appendChild(field("Star value (cents) for cash-out",inputEl("number",state.settings.starValueCents,v=>{state.settings.starValueCents=parseInt(v||"0",10)||0;})));
  sg.appendChild(field("Pay day",selectEl([["Sunday","Sunday"],["Monday","Monday"],["Tuesday","Tuesday"],["Wednesday","Wednesday"],["Thursday","Thursday"],["Friday","Friday"],["Saturday","Saturday"]],state.settings.payDay,v=>{state.settings.payDay=v;})));
  sg.appendChild(field("Parent PIN (4 digits)",inputEl("tel",state.settings.parentPin,v=>{state.settings.parentPin=(v||"").replace(/\D/g,"").slice(0,4)||"0000";})));
  sg.appendChild(field("Sound",selectEl([["on","On"],["off","Off"]],state.settings.soundOn?"on":"off",v=>{state.settings.soundOn=(v==="on");})));
  b.appendChild(sg);

  // --- Backup & restore ---
  const kg=document.createElement("div"); kg.className="parent-group";
  kg.innerHTML="<h4>💾 Backup & Restore</h4><p class='muted tiny' style='margin-bottom:10px'>iOS Safari can clear saved data. Copy this backup somewhere safe (Notes, email). Paste a backup to restore.</p>";
  const ta=document.createElement("textarea"); ta.id="backupArea"; ta.value=JSON.stringify(state);
  ta.style.cssText="width:100%;min-height:90px;border:2px solid var(--line);border-radius:12px;padding:10px;font-size:12px;-webkit-user-select:text;user-select:text;font-family:monospace";
  kg.appendChild(ta);
  const copyBtn=btn("📋 Copy backup","btn-sky",async()=>{
    ta.value=JSON.stringify(state);
    try{ await navigator.clipboard.writeText(ta.value); toastQuick("Backup copied!"); }
    catch(e){ ta.select(); document.execCommand&&document.execCommand("copy"); toastQuick("Selected — press Copy"); }
  });
  const restoreBtn=btn("📥 Restore from box","btn-ghost",()=>{
    try{
      const obj=JSON.parse(ta.value);
      if(!obj||!obj.kids||!Array.isArray(obj.kids)) throw new Error("bad");
      showMessage("Restore backup?","This replaces all current data with the pasted backup.",[
        {label:"Restore",cls:"btn-coral",fn:()=>{ state=obj; save(); closeMsg(); renderParent(); renderHome(); toastQuick("Restored!"); }},
        {label:"Cancel",cls:"btn-ghost",fn:closeMsg}
      ]);
    }catch(e){ toastQuick("That's not a valid backup"); }
  });
  const br=document.createElement("div"); br.className="btn-row"; br.append(copyBtn,restoreBtn);
  kg.appendChild(br);
  b.appendChild(kg);

  // --- Danger zone ---
  const dz=document.createElement("div"); dz.className="parent-group";
  dz.innerHTML="<h4>⚠️ Reset</h4>";
  const resetToday=btn("Reset today's checkmarks","btn-ghost",()=>{
    showMessage("Reset today?","Clears today's daily-quest checkmarks for both kids. Stars are not affected.",[
      {label:"Reset today",cls:"btn-coral",fn:()=>{ state.kids.forEach(k=>delete k.doneByDate[todayKey()]); save(); closeMsg(); toastQuick("Today reset"); }},
      {label:"Cancel",cls:"btn-ghost",fn:closeMsg}
    ]);
  });
  const resetAll=btn("Reset ALL data","btn-coral",()=>{
    showMessage("Erase everything?","This wipes all stars, settings and history and restores defaults. Back up first!",[
      {label:"Erase all",cls:"btn-coral",fn:()=>{ state=seed(); save(); closeMsg(); renderParent(); renderHome(); toastQuick("All data reset"); }},
      {label:"Cancel",cls:"btn-ghost",fn:closeMsg}
    ]);
  });
  dz.append(resetToday,resetAll);
  b.appendChild(dz);

  // save on any field blur is handled inline; ensure a final save button
  const saveBar=btn("✅ Save & Done","btn-quest",()=>{ save(); renderHome(); go("home"); });
  saveBar.style.marginBottom="10px";
  b.appendChild(saveBar);
}

/* ---- parent form builders ---- */
function field(label,inputNode){
  const w=document.createElement("div"); w.className="field";
  const l=document.createElement("label"); l.textContent=label;
  w.append(l,inputNode); return w;
}
function inputEl(type,val,onChange){
  const i=document.createElement("input"); i.type=type; i.value=val==null?"":val;
  if(type==="number"||type==="tel") i.inputMode="numeric";
  i.addEventListener("input",()=>{ onChange(i.value); save(); });
  return i;
}
function selectEl(opts,val,onChange){
  const s=document.createElement("select");
  opts.forEach(([v,t])=>{ const o=document.createElement("option"); o.value=v; o.textContent=t; if(v===val)o.selected=true; s.appendChild(o); });
  s.addEventListener("change",()=>{ onChange(s.value); save(); });
  return s;
}
function editRow(obj,fields,onDelete){
  const row=document.createElement("div"); row.className="editrow";
  fields.forEach(f=>{
    if(f==="scope"){
      const opts=[["all","All"]]; state.kids.forEach(k=>opts.push([k.id,k.name]));
      const s=selectEl(opts,obj.scope,v=>{obj.scope=v;}); s.classList.add("sel-in"); row.appendChild(s);
    } else {
      const i=document.createElement("input");
      i.className = f==="emoji"?"emoji-in" : f==="stars"||f==="cost"?"num-in" : "grow";
      i.type = (f==="stars"||f==="cost")?"number":"text";
      if(i.type==="number") i.inputMode="numeric";
      i.value = obj[f]==null?"":obj[f];
      i.addEventListener("input",()=>{ obj[f] = (f==="stars"||f==="cost")?(parseInt(i.value||"0",10)||0):i.value; save(); });
      row.appendChild(i);
    }
  });
  const x=document.createElement("button"); x.className="del-x"; x.textContent="✕"; x.onclick=onDelete;
  row.appendChild(x);
  return row;
}
function addBtn(label,fn){ const b=document.createElement("button"); b.className="addbtn"; b.textContent=label; b.onclick=fn; return b; }
function btn(label,cls,fn){ const b=document.createElement("button"); b.className="bigbtn "+cls; b.textContent=label; b.onclick=fn; return b; }
function toastQuick(msg){
  const t=$("#toast"); t.querySelector(".msg").textContent=msg; t.querySelector(".undo").style.display="none";
  t.classList.add("show"); clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>{ t.classList.remove("show"); t.querySelector(".undo").style.display=""; },2200);
}

/* ============================================================
   8. UTILITIES / BOOT
   ============================================================ */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// Generate apple-touch-icon (quest shield) on a canvas → keeps file self-contained
function makeIcon(){
  try{
    const cv=document.createElement("canvas"); cv.width=180; cv.height=180;
    const x=cv.getContext("2d");
    x.fillStyle="#1f3a4d"; x.fillRect(0,0,180,180);
    // shield
    x.fillStyle="#f3a712"; x.beginPath();
    x.moveTo(90,28); x.lineTo(146,50); x.lineTo(146,96);
    x.quadraticCurveTo(146,140,90,158); x.quadraticCurveTo(34,140,34,96);
    x.lineTo(34,50); x.closePath(); x.fill();
    // star
    x.fillStyle="#2f7d5b"; star(x,90,92,30,14,5);
    document.getElementById("appleIcon").href=cv.toDataURL("image/png");
  }catch(e){}
}
function star(ctx,cx,cy,outer,inner,points){
  ctx.beginPath();
  for(let i=0;i<points*2;i++){
    const r=i%2?inner:outer, a=Math.PI/points*i-Math.PI/2;
    ctx[i?"lineTo":"moveTo"](cx+Math.cos(a)*r, cy+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
}

// Add-to-Home-Screen hint (only in regular Safari on iOS)
function maybeShowInstallHint(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=("standalone" in navigator) ? navigator.standalone : matchMedia("(display-mode: standalone)").matches;
  if(isIOS && standalone===false && !localStorage.getItem("qt.hintDismissed")){
    const h=document.createElement("div"); h.className="hint";
    h.innerHTML=`<span>📲 Add to Home Screen: tap <b>Share</b>, then <b>Add to Home Screen</b> — it opens fullscreen like an app.</span>`;
    const b=document.createElement("button"); b.textContent="Got it";
    b.onclick=()=>{ localStorage.setItem("qt.hintDismissed","1"); h.remove(); };
    h.appendChild(b);
    $("#installHint").appendChild(h);
  }
}

// prevent body rubber-band while allowing inner scroll
document.addEventListener("touchmove",e=>{
  if(!e.target.closest(".scroll, .sheet, textarea")) e.preventDefault();
},{passive:false});

// midnight rollover: if date changes while app open, refresh daily view
let bootDay=todayKey();
setInterval(()=>{ if(todayKey()!==bootDay){ bootDay=todayKey(); if($("#screen-kid").classList.contains("active")) renderKid(); } },60000);

function boot(){
  buildKeypad();
  makeIcon();
  renderHome();
  maybeShowInstallHint();
}
boot();
